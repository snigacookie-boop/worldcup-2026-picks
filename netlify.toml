[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# SPA fallback so direct hits to /picks, /admin etc. serve index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Sync once a day at 08:00 UTC (1am PT / 4am ET) — after every match anywhere in the
# US/MX/CA hosts has finished. Admin can also hit "Sync scores" on the Admin tab anytime.
[functions."sync-scores"]
  schedule = "0 8 * * *"

# Email pick reminders once a day at 13:00 UTC (9am ET) listing each user's unpicked
# matches that kick off within the next 24 hours. Skips users who are fully caught up.
[functions."send-reminders"]
  schedule = "0 13 * * *"
